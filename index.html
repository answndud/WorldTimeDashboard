<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Time - 세계 시간</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root, [data-theme="light"] {
            --bg-primary: #f6f7f8;
            --bg-secondary: #eceef0;
            --bg-card: rgba(255, 255, 255, 0.9);
            --accent: #111416;
            --accent-soft: #e5e7e9;
            --text-primary: #101214;
            --text-secondary: #5b6368;
            --text-muted: #848c92;
            --border-color: #d7dde0;
            --shadow-card: 0 1px 1px rgba(16, 18, 20, 0.04);
            --shadow-raised: 0 6px 18px rgba(16, 18, 20, 0.06);
            --danger: #a6473d;
            --success: #1e6f46;
            --day: #6f7478;
            --night: #6f7478;
        }

        [data-theme="dark"] {
            --bg-primary: #0f1214;
            --bg-secondary: #161a1d;
            --bg-card: rgba(22, 26, 29, 0.92);
            --accent: #f2f4f4;
            --accent-soft: #21262a;
            --text-primary: #f2f4f4;
            --text-secondary: #b6bec2;
            --text-muted: #869196;
            --border-color: #2b3236;
            --shadow-card: 0 1px 1px rgba(0, 0, 0, 0.28);
            --shadow-raised: 0 6px 18px rgba(0, 0, 0, 0.22);
            --danger: #ffb4ab;
            --success: #8bd39a;
            --day: #aab1b6;
            --night: #aab1b6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 28px 18px;
            position: relative;
            z-index: 1;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            color: var(--text-secondary);
            transition: border-color 0.2s ease, background 0.2s ease;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
        }

        .theme-toggle-icon {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--accent);
        }

        .theme-toggle-text {
            font-weight: 500;
        }

        /* Header */
        header {
            margin-bottom: 22px;
            padding: 4px 0 0;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(1.45rem, 3vw, 2.15rem);
            font-weight: 500;
            letter-spacing: 0;
            color: var(--text-primary);
            margin-bottom: 7px;
        }

        .subtitle {
            font-size: 0.84rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Korea Time Display */
        .korea-time-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 9px;
            padding: 14px 16px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease, border-color 0.3s ease;
            box-shadow: var(--shadow-card);
        }

        .korea-time-section::before {
            display: none;
        }

        .korea-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .korea-label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
        }

        .korea-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(1.85rem, 4vw, 2.45rem);
            font-weight: 500;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .korea-date {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
        }

        /* Grid Layout */
        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 10px;
        }

        /* Time Card */
        .time-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 12px 11px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: var(--shadow-card);
        }

        .time-card:hover {
            border-color: #b8c2c6;
            box-shadow: var(--shadow-raised);
        }

        .time-card::before {
            display: none;
        }

        .time-card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 12px;
        }

        .city-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
        }

        .city-name {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.1;
        }

        .city-country {
            font-size: 0.68rem;
            color: var(--text-muted);
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .time-diff {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.64rem;
            padding: 3px 6px;
            border-radius: 999px;
            font-weight: 500;
            white-space: nowrap;
            border: 1px solid var(--border-color);
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .time-diff.behind {
            background: transparent;
            color: var(--danger);
        }

        .time-diff.ahead {
            background: transparent;
            color: var(--success);
        }

        .time-diff.same {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: transparent;
        }

        .current-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: 0;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .current-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
        }

        .day-status {
            display: inline-flex;
            align-items: center;
            margin-top: 8px;
            padding: 3px 6px;
            border-radius: 999px;
            font-size: 0.64rem;
            font-weight: 500;
            border: 1px solid var(--border-color);
            line-height: 1;
            letter-spacing: 0.02em;
        }

        .day-status.day {
            background: transparent;
            color: var(--day);
        }

        .day-status.night {
            background: transparent;
            color: var(--night);
        }

        .day-status.dawn {
            background: transparent;
            color: var(--accent);
        }

        .day-status.dusk {
            background: transparent;
            color: var(--text-secondary);
        }

        /* Category Labels */
        .category-label {
            font-size: 0.68rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 24px 0 10px;
            padding-left: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 38px;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Market Status */
        .market-info {
            margin-top: 9px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-width: 0;
            opacity: 0.72;
        }

        .market-label {
            font-size: 0.68rem;
            color: var(--text-muted);
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .market-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.66rem;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .market-status.open {
            color: var(--success);
        }

        .market-status.closed {
            color: var(--danger);
        }

        .market-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .market-status.open::before {
            animation: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 18px 14px;
            }

            .theme-toggle {
                top: 12px;
                right: 12px;
                padding: 8px;
            }

            .theme-toggle-text {
                display: none;
            }

            .korea-time-section {
                flex-direction: column;
                align-items: flex-start;
                padding: 16px;
            }

            .korea-info {
                flex-direction: row;
                gap: 0;
            }

            .korea-time {
                font-size: 1.95rem;
            }

            .time-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .current-time {
                font-size: 1.7rem;
            }
        }

        @media (max-width: 560px) {
            .time-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 769px) and (max-width: 1100px) {
            .time-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (min-width: 1101px) {
            .time-grid {
                grid-template-columns: repeat(5, minmax(0, 1fr));
            }
        }
    </style>

        // Calculate timezone offset from Seoul (KST) dynamically - handles DST automatically
        function getTimezoneOffset(timezone) {
            const now = new Date();
            
            // Get time in Seoul
            const seoulTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
            // Get time in target timezone
            const targetTime = new Date(now.toLocaleString('en-US', { timeZone: timezone }));
            
            // Calculate difference in hours
            const diffMs = targetTime - seoulTime;
            const diffHours = diffMs / (1000 * 60 * 60);
            
            // Round to nearest 0.5 for half-hour timezones (like India)
            return Math.round(diffHours * 2) / 2;
        }
        
        // Check if a timezone is currently in DST
        function isDST(timezone) {
            const now = new Date();
            const jan = new Date(now.getFullYear(), 0, 1);
            const jul = new Date(now.getFullYear(), 6, 1);
            
            const janOffset = new Date(jan.toLocaleString('en-US', { timeZone: timezone })) - jan;
            const julOffset = new Date(jul.toLocaleString('en-US', { timeZone: timezone })) - jul;
            const nowOffset = new Date(now.toLocaleString('en-US', { timeZone: timezone })) - now;
            
            // If current offset is not the same as Jan offset, and we're in Northern Hemisphere DST pattern
            // Or if current offset is not the same as Jul offset for Southern Hemisphere
            const standardOffset = Math.min(janOffset, julOffset);
            return nowOffset !== standardOffset;
        }

        const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

        function formatTime(date) {
            return date.toLocaleTimeString('ko-KR', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const dayName = dayNames[date.getDay()];
            return `${year}년 ${month}월 ${day}일 (${dayName})`;
        }

        function formatShortDate(date) {
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const dayName = dayNames[date.getDay()];
            return `${month}/${day} (${dayName})`;
        }

        function getTimeInTimezone(timezone) {
            return new Date(new Date().toLocaleString('en-US', { timeZone: timezone }));
        }

        function getDayStatus(hour) {
            if (hour >= 6 && hour < 8) return { status: 'dawn', text: '새벽' };
            if (hour >= 8 && hour < 18) return { status: 'day', text: '낮' };
            if (hour >= 18 && hour < 20) return { status: 'dusk', text: '저녁' };
            return { status: 'night', text: '밤' };
        }

        function getTimeDiffText(offset, hasDST, timezone) {
            const isDSTActive = hasDST && isDST(timezone);
            let dstIndicator = isDSTActive ? ' · DST' : '';
            
            if (offset === 0) {
                return { text: '동일' + dstIndicator, class: 'same', isDST: isDSTActive };
            } else if (offset > 0) {
                const hours = Math.floor(offset);
                const minutes = Math.round((offset % 1) * 60);
                if (minutes > 0) {
                    return { text: `+${hours}시간 ${minutes}분` + dstIndicator, class: 'ahead', isDST: isDSTActive };
                }
                return { text: `+${offset}시간` + dstIndicator, class: 'ahead', isDST: isDSTActive };
            } else {
                const hours = Math.floor(Math.abs(offset));
                const minutes = Math.round((Math.abs(offset) % 1) * 60);
                if (minutes > 0) {
                    return { text: `-${hours}시간 ${minutes}분` + dstIndicator, class: 'behind', isDST: isDSTActive };
                }
                return { text: `${offset}시간` + dstIndicator, class: 'behind', isDST: isDSTActive };
            }
        }

            const card = document.createElement('div');
            card.className = 'time-card';
            card.dataset.timezone = city.timezone;
            card.dataset.hasDst = city.hasDST ? 'true' : 'false';
            card.dataset.market = city.market || '';
            card.dataset.marketOpen = city.marketHours?.open || '';
            card.dataset.marketClose = city.marketHours?.close || '';
            
            // Calculate offset dynamically (handles DST)
            const offset = getTimezoneOffset(city.timezone);
            const timeDiff = getTimeDiffText(offset, city.hasDST, city.timezone);
            
            let marketHtml = '';
            if (city.market) {
                marketHtml = `
                    <div class="market-info">
                        <div class="market-label">${city.market}${city.sports ? ' · ' + city.sports : ''}</div>
                        <div class="market-status" data-market-status>--</div>
                    </div>
                `;
            } else if (city.sports) {
                marketHtml = `
                    <div class="market-info">
                        <div class="market-label">${city.sports}</div>
                    </div>
                `;
            }
            
            card.innerHTML = `
                <div class="card-header">
                    <div class="city-info">
                        <div class="city-name">${city.name}</div>
                        <div class="city-country">${city.nameEn} · ${city.country}</div>
                    </div>
                    <span class="time-diff ${timeDiff.class}" data-time-diff>${timeDiff.text}</span>
                </div>
                <div class="current-time" data-time>--:--:--</div>
                <div class="current-date" data-date>--/-- (--)</div>
                <div class="day-status" data-day-status>--</div>
                ${marketHtml}
            `;
            
            return card;
        }

        function initializeCards() {
            const americasGrid = document.getElementById('americas-grid');
            const europeGrid = document.getElementById('europe-grid');
            const asiaGrid = document.getElementById('asia-grid');
            const oceaniaGrid = document.getElementById('oceania-grid');
            
            let index = 0;
            
            cities.americas.forEach((city) => {
                americasGrid.appendChild(createCityCard(city, index++));
            });
            
            cities.europe.forEach((city) => {
                europeGrid.appendChild(createCityCard(city, index++));
            });
            
            cities.asia.forEach((city) => {
                asiaGrid.appendChild(createCityCard(city, index++));
            });
            
            cities.oceania.forEach((city) => {
                oceaniaGrid.appendChild(createCityCard(city, index++));
            });
        }

        function updateAllTimes() {
            // Update Korea time
            const koreaTime = getTimeInTimezone('Asia/Seoul');
            document.getElementById('korea-time').textContent = formatTime(koreaTime);
            document.getElementById('korea-date').textContent = formatDate(koreaTime);
            
            // Update all city cards
            document.querySelectorAll('.time-card').forEach(card => {
                const timezone = card.dataset.timezone;
                const hasDST = card.dataset.hasDst === 'true';
                const localTime = getTimeInTimezone(timezone);
                
                card.querySelector('[data-time]').textContent = formatTime(localTime);
                card.querySelector('[data-date]').textContent = formatShortDate(localTime);
                
                const hour = localTime.getHours();
                const dayStatus = getDayStatus(hour);
                const dayStatusEl = card.querySelector('[data-day-status]');
                dayStatusEl.textContent = dayStatus.text;
                dayStatusEl.className = `day-status ${dayStatus.status}`;
                
                // Update time difference (handles DST changes dynamically)
                const timeDiffEl = card.querySelector('[data-time-diff]');
                if (timeDiffEl) {
                    const offset = getTimezoneOffset(timezone);
                    const timeDiff = getTimeDiffText(offset, hasDST, timezone);
                    timeDiffEl.textContent = timeDiff.text;
                    timeDiffEl.className = `time-diff ${timeDiff.class}`;
                }
                
                // Update market status if applicable
                const marketStatusEl = card.querySelector('[data-market-status]');
                if (marketStatusEl && card.dataset.market) {
                    const marketOpen = parseFloat(card.dataset.marketOpen);
                    const marketClose = parseFloat(card.dataset.marketClose);
                    const day = localTime.getDay();
                    const currentHour = localTime.getHours() + localTime.getMinutes() / 60;
                    
                    let marketStatus;
                    if (day === 0 || day === 6) {
                        marketStatus = { open: false, text: '휴장 (주말)' };
                    } else if (currentHour >= marketOpen && currentHour < marketClose) {
                        marketStatus = { open: true, text: '개장 중' };
                    } else {
                        marketStatus = { open: false, text: '폐장' };
                    }
                    
                    marketStatusEl.textContent = marketStatus.text;
                    marketStatusEl.className = `market-status ${marketStatus.open ? 'open' : 'closed'}`;
                }
            });
        }

        // Initialize
        initializeCards();
        updateAllTimes();
        
        // Update every second
        setInterval(updateAllTimes, 1000);
    </script>
</body>
</html>
